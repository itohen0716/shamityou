<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#795548">

  <title>絲庵 ─ Shamisen ─</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./images/icons/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="./images/icons/icon-192.png">
  <link rel="stylesheet" href="./style.css?v=244">
</head>

<body class="home-body">
  <main class="home-app">

    <header class="home-header">
      <img
        class="home-character"
        src="./images/home/shami-home.png"
        alt="三味線を持つ黒猫のシャミ"
        width="168"
        height="168"
      >

      <p class="brand-name">絲庵</p>
      <h1 class="home-title">─ Shamisen ─</h1>

      <p class="home-message">
        シャミと一緒に、今日の練習を始めましょう。
      </p>
    </header>

    <nav class="home-menu" aria-label="練習メニュー">

      <!-- 調弦 -->
      <a class="menu-button active-menu" href="./tuning.html">
        <img
          class="menu-image"
          src="./images/home/icon-tuning.png"
          alt=""
        >

        <span class="menu-text">
          <strong>調弦</strong>
          <small>本調子・二上り・三下り</small>
        </span>

        <span class="menu-arrow" aria-hidden="true">›</span>
      </a>

      <!-- 耳を育てる -->
      <a class="menu-button active-menu" href="./mimi-game/index.html">
        <img
          class="menu-image"
          src="./images/home/icon-ear.png"
          alt=""
        >

        <span class="menu-text">
          <strong>耳を育てる</strong>
          <small>三味線耳を育てよう♪</small>
        </span>

        <span class="menu-arrow" aria-hidden="true">›</span>
      </a>

      <!-- 録音・再生 -->
      <a class="menu-button active-menu" href="./tuner/index.html">
        <img
          class="menu-image"
          src="./images/home/icon-ear.png"
          alt=""
        >

        <span class="menu-text">
          <strong>チューナー</strong>
          <small>オーソドックスなチューナー♪</small>
        </span>

        <span class="menu-arrow" aria-hidden="true">›</span>
      </a>

      <!-- 練習記録 -->
      <button
        class="menu-button disabled-menu"
        type="button"
        disabled
        aria-label="練習記録 準備中"
      >
        <span class="menu-icon" aria-hidden="true">●</span>

        <span class="menu-text">
          <strong>練習記録</strong>
          <small>準備中</small>
        </span>
      </button>

      <!-- 監修・協力 -->
      <a class="menu-button active-menu" href="./erika/index.html">
        <img
          class="menu-image"
          src="./images/home/icon-erika.png"
          alt=""
        >

        <span class="menu-text">
          <strong>監修・協力</strong>
          <small>染行エリカ先生</small>
        </span>

        <span class="menu-arrow" aria-hidden="true">›</span>
      </a>

    </nav>

    <button
      type="button"
      class="install-button"
      id="installButton"
      hidden
    >
      ホーム画面にインストール
    </button>

    <footer class="home-footer">
      <p>絲庵 ─ Shamisen ─</p>
      <p>Ver.2.5.2</p>
    </footer>

  </main>

  <script src="./home.js?v=240" defer></script>
</body>
</html>
