<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f7f2e8"><title>耳を育てる｜絃庵</title>
  <link rel="stylesheet" href="game.css?v=400">
</head>
<body><main class="app-shell">
  <section id="screen-menu" class="screen active">
    <a class="page-back-link" href="../index.html">‹ ホームへ戻る</a>
    <header class="page-heading"><img src="images/mimi-icon.png" alt="" class="page-icon"><div><h1>耳を育てる</h1><p>先生の三味線音源で音感を育てよう</p></div></header>
    <section class="ear-level-panel"><div class="ear-level-main"><span>耳レベル</span><strong id="ear-level-label">Lv.1</strong></div><div class="level-progress"><span id="level-progress-fill"></span></div><p id="level-progress-text">累計 0 問正解</p></section>
    <div id="certification-banner" class="certification-banner hidden"><strong>三味線耳認定！</strong><span>すべてのゲームをクリアしました</span></div>
    <div class="menu-intro"><h2>ゲームを選んでね</h2><p>すべて teacher 音源を使います。</p></div>
    <div class="game-menu">
      <button class="game-card" data-action="open-tuning"><span class="game-card-number">1</span><span class="game-card-body"><strong>調子を当てる</strong><small>本調子・二上り・三下りを聴き分ける</small></span><span class="arrow">›</span></button>
      <button class="game-card" data-action="start-match"><span class="game-card-number">2</span><span class="game-card-body"><strong>音を合わせる</strong><small>音を上下して基準音に近づける</small></span><span class="arrow">›</span></button>
    </div>
  </section>
  <section id="screen-tuning-select" class="screen">
    <button class="back-button" data-action="menu">‹ ゲーム選択へ</button>
    <div class="hero compact"><img src="images/shami_ready.png" alt="" class="hero-shami"><div><h2>調子を当てる</h2><p>コースを選んでください</p></div></div>
    <div class="course-grid"><button class="course-card" data-action="start-basic"><strong>基本</strong><span>本数を表示</span><small>調子だけを当てる</small></button><button class="course-card" data-action="start-advanced"><strong>応用</strong><span>本数も非表示</span><small>調子と本数を当てる</small></button></div>
  </section>
  <section id="screen-tuning-game" class="screen">
    <div class="top-row"><button class="back-button" data-action="tuning-select">‹ コース選択へ</button><span id="tuning-course-badge" class="badge">基本</span></div>
    <div class="stats"><div><span>問題</span><strong id="tuning-question">1 / 10</strong></div><div><span>正解</span><strong id="tuning-score">0</strong></div><div><span>連続</span><strong id="tuning-streak">0</strong></div></div>
    <article class="quiz-panel"><img id="tuning-shami" src="images/shami_listening.png" alt="" class="quiz-shami"><h2>音を聴いてみよう</h2><p id="tuning-message" class="message">再生してください</p>
      <div id="hon-display" class="hon-display"></div><button id="play-tuning" class="primary-button">♪ 三本の糸を聴く</button>
      <fieldset class="answer-group"><legend>調子を選ぶ</legend><div class="answer-grid three"><button class="answer-button" data-tuning="honchoshi">本調子</button><button class="answer-button" data-tuning="niagari">二上り</button><button class="answer-button" data-tuning="sansagari">三下り</button></div></fieldset>
      <fieldset id="hon-answer-area" class="answer-group hidden"><legend>一の糸の本数</legend><div id="hon-buttons" class="hon-grid"></div></fieldset>
      <button id="submit-tuning" class="confirm-button" disabled>回答する</button><button id="next-tuning" class="primary-button hidden">次の問題へ</button>
    </article>
  </section>
  <section id="screen-match-game" class="screen">
    <button class="back-button" data-action="menu">‹ ゲーム選択へ</button>
    <div class="stats"><div><span>問題</span><strong id="match-question">1 / 10</strong></div><div><span>正解</span><strong id="match-score">0</strong></div><div><span>連続</span><strong id="match-streak">0</strong></div></div>
    <article class="quiz-panel"><div class="timer-wrap"><span>残り</span><strong id="timer">20</strong><span>秒</span></div><div class="timer-bar"><span id="timer-bar-fill"></span></div>
      <img id="match-shami" src="images/shami_listening.png" alt="" class="quiz-shami"><h2>基準音に合わせよう</h2><p id="match-message" class="message">二つの音を聴き比べてください</p>
      <div class="sound-buttons"><button id="play-target" class="secondary-button">♪ 基準音</button><button id="play-player" class="secondary-button">♪ 自分の音</button><button id="play-compare" class="primary-button">♪ 聴き比べる</button></div>
      <div class="pitch-controls"><button data-shift="-20">大きく下げる</button><div class="pitch-row"><button data-shift="-5">少し下げる</button><button data-shift="5">少し上げる</button></div><button data-shift="20">大きく上げる</button></div>
      <button id="submit-match" class="confirm-button">この音で決定</button><button id="next-match" class="primary-button hidden">次の問題へ</button>
    </article>
  </section>
  <section id="screen-result" class="screen"><article class="result-panel"><img id="result-shami" src="images/shami_finish.png" alt="" class="result-shami"><h2>ゲーム終了！</h2><p id="result-course" class="badge large"></p><div class="result-score"><span>正解数</span><strong id="result-score"></strong></div><div class="result-score secondary"><span>最高連続正解</span><strong id="result-best-streak"></strong></div><p id="result-message" class="result-message"></p><div id="result-certification" class="hidden"></div><div class="result-actions"><button id="replay-button" class="primary-button">もう一度</button><button data-action="menu" class="secondary-button">ゲームを選ぶ</button><a class="home-link button-like" href="../index.html">ホームへ戻る</a></div></article></section>
</main>
<script src="../sound-segments.js?v=400"></script><script src="../audio-engine.js?v=400"></script><script src="game.js?v=400"></script>
</body></html>
