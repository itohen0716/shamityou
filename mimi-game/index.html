<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f7f2e8">
  <title>耳を育てる｜絲庵</title>
  <link rel="stylesheet" href="game.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <p class="brand">絲庵 Shian</p>
      <h1>耳を育てる</h1>
      <p class="subtitle">音をよく聴いて、楽しく耳を鍛えよう</p>
    </header>

    <section id="screen-menu" class="screen active" aria-labelledby="menu-title">
      <div class="hero">
        <img src="images/shami_listening.png" alt="耳を澄ませるシャミ" class="hero-shami">
        <div>
          <h2 id="menu-title">ゲームを選んでね</h2>
          <p>マイクは使いません。アプリの音を聴いて答えます。</p>
        </div>
      </div>

      <div class="game-menu">
        <button type="button" class="game-card" data-action="open-tuning">
          <span class="game-card-number">1</span>
          <span class="game-card-body">
            <strong>調子を当てる</strong>
            <small>本調子・二上り・三下りを聴き分ける</small>
          </span>
          <span class="arrow" aria-hidden="true">›</span>
        </button>

        <button type="button" class="game-card" data-action="start-match">
          <span class="game-card-number">2</span>
          <span class="game-card-body">
            <strong>音を合わせる</strong>
            <small>音を上げ下げして基準音に近づける</small>
          </span>
          <span class="arrow" aria-hidden="true">›</span>
        </button>
      </div>

      <a class="home-link" href="../index.html">ホームへ戻る</a>
    </section>

    <section id="screen-tuning-select" class="screen" aria-labelledby="tuning-select-title">
      <button type="button" class="back-button" data-action="menu">‹ ゲーム選択へ</button>
      <div class="hero compact">
        <img src="images/shami_ready.png" alt="準備万端のシャミ" class="hero-shami">
        <div>
          <h2 id="tuning-select-title">調子を当てる</h2>
          <p>コースを選んでください。</p>
        </div>
      </div>

      <div class="course-grid">
        <button type="button" class="course-card" data-action="start-basic">
          <strong>基本</strong>
          <span>本数は画面に表示</span>
          <small>調子だけを当てる</small>
        </button>

        <button type="button" class="course-card" data-action="start-advanced">
          <strong>応用</strong>
          <span>本数も非表示</span>
          <small>調子と本数を当てる</small>
        </button>
      </div>
    </section>

    <section id="screen-tuning-game" class="screen" aria-labelledby="tuning-title">
      <div class="top-row">
        <button type="button" class="back-button" data-action="tuning-select">‹ コース選択へ</button>
        <span id="tuning-course-badge" class="badge">基本</span>
      </div>

      <div class="stats" aria-label="成績">
        <div><span>問題</span><strong id="tuning-question">1 / 10</strong></div>
        <div><span>正解</span><strong id="tuning-score">0</strong></div>
        <div><span>連続</span><strong id="tuning-streak">0</strong></div>
      </div>

      <article class="quiz-panel">
        <img id="tuning-shami" src="images/shami_listening.png" alt="シャミ" class="quiz-shami">
        <h2 id="tuning-title">音を聴いてみよう</h2>
        <p id="tuning-message" class="message" aria-live="polite">再生ボタンを押してください。</p>

        <div id="hon-display" class="hon-display">一の糸：6本</div>

        <button type="button" id="play-tuning" class="primary-button">
          ♪ 3本の糸を聴く
        </button>

        <fieldset class="answer-group">
          <legend>調子を選ぶ</legend>
          <div class="answer-grid three">
            <button type="button" class="answer-button" data-tuning="honchoshi">本調子</button>
            <button type="button" class="answer-button" data-tuning="niagari">二上り</button>
            <button type="button" class="answer-button" data-tuning="sansagari">三下り</button>
          </div>
        </fieldset>

        <fieldset id="hon-answer-area" class="answer-group hidden">
          <legend>一の糸の本数</legend>
          <div id="hon-buttons" class="hon-grid"></div>
        </fieldset>

        <button type="button" id="submit-tuning" class="confirm-button" disabled>回答する</button>
        <button type="button" id="next-tuning" class="primary-button hidden">次の問題へ</button>
      </article>
    </section>

    <section id="screen-match-game" class="screen" aria-labelledby="match-title">
      <button type="button" class="back-button" data-action="menu">‹ ゲーム選択へ</button>

      <div class="stats" aria-label="成績">
        <div><span>問題</span><strong id="match-question">1 / 10</strong></div>
        <div><span>正解</span><strong id="match-score">0</strong></div>
        <div><span>連続</span><strong id="match-streak">0</strong></div>
      </div>

      <article class="quiz-panel">
        <div class="timer-wrap">
          <span>残り時間</span>
          <strong id="timer">20</strong>
          <span>秒</span>
        </div>
        <div class="timer-bar"><span id="timer-bar-fill"></span></div>

        <img id="match-shami" src="images/shami_listening.png" alt="シャミ" class="quiz-shami">
        <h2 id="match-title">基準音に合わせよう</h2>
        <p id="match-message" class="message" aria-live="polite">2つの音を聴き比べてください。</p>

        <div class="sound-buttons">
          <button type="button" id="play-target" class="secondary-button">♪ 基準音</button>
          <button type="button" id="play-player" class="secondary-button">♪ 自分の音</button>
          <button type="button" id="play-compare" class="primary-button">♪ 聴き比べる</button>
        </div>

        <div class="pitch-controls" aria-label="音程調整">
          <button type="button" data-shift="-20">大きく下げる</button>
          <div class="pitch-row">
            <button type="button" data-shift="-5">少し下げる</button>
            <button type="button" data-shift="5">少し上げる</button>
          </div>
          <button type="button" data-shift="20">大きく上げる</button>
        </div>

        <button type="button" id="submit-match" class="confirm-button">この音で確定</button>
        <button type="button" id="next-match" class="primary-button hidden">次の問題へ</button>
      </article>
    </section>

    <section id="screen-result" class="screen" aria-labelledby="result-title">
      <article class="result-panel">
        <img id="result-shami" src="images/shami_finish.png" alt="ゲームを終えて喜ぶシャミ" class="result-shami">
        <h2 id="result-title">ゲーム終了！</h2>
        <p id="result-course" class="badge large">調子を当てる・基本</p>

        <div class="result-score">
          <span>正解数</span>
          <strong id="result-score">0 / 10</strong>
        </div>
        <div class="result-score secondary">
          <span>最高連続正解</span>
          <strong id="result-best-streak">0</strong>
        </div>

        <p id="result-message" class="result-message">よく頑張ったね♪</p>

        <div class="result-actions">
          <button type="button" id="replay-button" class="primary-button">もう一度遊ぶ</button>
          <button type="button" data-action="menu" class="secondary-button">ゲームを選ぶ</button>
          <a class="home-link button-like" href="../index.html">ホームへ戻る</a>
        </div>
      </article>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
