<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#6f5145">
  <title>調弦中｜絲庵 ─ Shamisen ─</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./images/icons/icon-192.png">
  <link rel="apple-touch-icon" href="./images/icons/icon-192.png">
  <link rel="stylesheet" href="./style.css?v=250">
</head>
<body>
  <main class="app">
    <a class="back-link" href="./tuning.html">‹ 設定へ戻る</a>

    <header class="page-header">
      <img src="./images/icons/icon-192.png" alt="" width="64" height="64">
      <div>
        <h1>調弦中</h1>
        <p id="playSummary">設定を読み込んでいます</p>
      </div>
    </header>

    <section class="card">
      <h2>基準音</h2>
      <div class="string-grid">
        <button type="button" data-string="ichi"><strong>一の糸</strong><small id="hzIchi"></small></button>
        <button type="button" data-string="ni"><strong>二の糸</strong><small id="hzNi"></small></button>
        <button type="button" data-string="san"><strong>三の糸</strong><small id="hzSan"></small></button>
      </div>
      <button id="stopButton" class="stop-button" type="button">音と測定を止める</button>
    </section>

    <section class="card tuner-card">
      <p id="micState" class="mic-state">準備しています</p>

      <div class="meter" aria-label="音程メーター">
        <span>低い</span><span>合っている</span><span>高い</span>
        <div class="meter-track"><div id="meterNeedle" class="meter-needle"></div></div>
      </div>

      <p id="judgement" class="judgement">三味線を弾くと判定します</p>

      <div class="shami-feedback">
        <img id="expressionImage" src="./images/expressions/shami_listening.png" alt="シャミ">
        <p id="shamiMessage">音を聴く準備をしています</p>
      </div>
    </section>

    <div id="sceneOverlay" class="scene-overlay" hidden>
      <img id="sceneImage" alt="">
    </div>

    <p class="note">
      三弦を順番に合わせるモードでは、
      「一弦から順番に合わせていくよ」→「次は二弦」→「次は三弦」→「整いました」
      の画像が、このページで順番に表示されます。
    </p>

    <p class="version">調弦実行 Ver.2.5.0</p>
  </main>

  <script src="./tuner.js?v=250" defer></script>
  <script src="./tuning-play.js?v=250" defer></script>
</body>
</html>
