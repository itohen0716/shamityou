<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#6f5145">
  <title>調弦設定｜絲庵 ─ Shamisen ─</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./images/icons/icon-192.png">
  <link rel="apple-touch-icon" href="./images/icons/icon-192.png">
  <link rel="stylesheet" href="./style.css?v=250">
</head>
<body>
  <main class="app">
    <a class="back-link" href="./index.html">‹ ホームへ戻る</a>

    <header class="page-header">
      <img src="./images/icons/icon-192.png" alt="" width="64" height="64">
      <div>
        <h1>調弦</h1>
        <p>調弦・本数・合わせ方を選びます。</p>
      </div>
    </header>

    <section class="card">
      <h2>調弦を選ぶ</h2>
      <div class="tuning-mode-grid" role="group" aria-label="調弦">
        <button type="button" class="image-choice active" data-tuning="hon" aria-pressed="true">
          <img src="./images/buttons/hon.png" alt=""><span>本調子</span>
        </button>
        <button type="button" class="image-choice" data-tuning="niage" aria-pressed="false">
          <img src="./images/buttons/niage.png" alt=""><span>二上り</span>
        </button>
        <button type="button" class="image-choice" data-tuning="sansage" aria-pressed="false">
          <img src="./images/buttons/sansage.png" alt=""><span>三下り</span>
        </button>
      </div>
    </section>

    <section class="card">
      <h2>一の糸の本数</h2>
      <select id="honCount" aria-label="一の糸の本数">
        <option value="1">1本</option><option value="2">2本</option>
        <option value="3">3本</option><option value="4">4本</option>
        <option value="5">5本</option><option value="6" selected>6本</option>
        <option value="7">7本</option><option value="8">8本</option>
        <option value="9">9本</option><option value="10">10本</option>
        <option value="11">11本</option><option value="12">12本</option>
      </select>
      <p id="settingSummary" class="setting-summary"></p>
    </section>

    <section class="card">
      <h2>合わせ方を選ぶ</h2>
      <div class="practice-grid" role="group" aria-label="合わせ方">
        <button type="button" class="practice-button" data-practice="sequence">
          <strong>① 三弦を順番に合わせていく</strong>
          <small>一の糸から三の糸まで自動で進みます</small>
        </button>
        <button type="button" class="practice-button" data-practice="single">
          <strong>② 一音、一音合わせていく</strong>
          <small>押した糸だけを合わせます</small>
        </button>
      </div>
    </section>

    <p class="note">合わせ方を押すと、調弦を行うページへ進みます。</p>
    <p class="version">調弦設定 Ver.2.5.0</p>
  </main>

  <script src="./setup.js?v=250" defer></script>
</body>
</html>
