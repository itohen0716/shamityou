<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#6f5145">
  <title>調弦｜絲庵 ─ Shamisen ─</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./images/icons/icon-192.png">
  <link rel="apple-touch-icon" href="./images/icons/icon-192.png">
  <link rel="stylesheet" href="./style.css?v=243">
</head>
<body>
  <main class="app">
    <a class="back-link" href="./index.html">‹ ホームへ戻る</a>

    <header class="page-header">
      <img src="./images/icons/icon-192.png" alt="" width="64" height="64">
      <div><h1>調弦</h1><p>基準音を聴きながら、三味線の音を合わせます。</p></div>
    </header>

    <section class="card">
      <h2>調弦を選ぶ</h2>
      <div class="tuning-mode-grid" role="group" aria-label="調弦">
        <button class="image-choice active" data-tuning="hon" aria-pressed="true">
          <img src="./images/buttons/hon.png" alt=""><span>本調子</span>
        </button>
        <button class="image-choice" data-tuning="niage" aria-pressed="false">
          <img src="./images/buttons/niage.png" alt=""><span>二上り</span>
        </button>
        <button class="image-choice" data-tuning="sansage" aria-pressed="false">
          <img src="./images/buttons/sansage.png" alt=""><span>三下り</span>
        </button>
      </div>
    </section>

    <section class="card">
      <h2>合わせ方を選ぶ</h2>
      <div class="practice-grid" role="group" aria-label="合わせ方">
        <button class="practice-button" data-practice="sequence">
          <strong>① 三弦を順番に合わせていく</strong>
          <small>一の糸から三の糸まで自動で進みます</small>
        </button>
        <button class="practice-button" data-practice="single">
          <strong>② 一音、一音合わせていく</strong>
          <small>押した糸だけを合わせます</small>
        </button>
      </div>
    </section>

    <section class="card">
      <h2>一の糸の本数</h2>
      <select id="honCount" aria-label="一の糸の本数">
        <option value="1">1本</option><option value="2">2本</option>
        <option value="3">3本</option><option value="4">4本</option>
        <option value="5">5本</option><option value="6" selected>6本</option>
        <option value="7">7本</option><option value="8">8本</option>
        <option value="9">9本</option><option value="10">10本</option>
        <option value="11">11本</option><option value="12">12本</option>
      </select>
      <p id="settingSummary" class="setting-summary"></p>
    </section>

    <section class="card">
      <h2>基準音</h2>
      <div class="string-grid">
        <button data-string="ichi"><strong>一の糸</strong><small id="hzIchi"></small></button>
        <button data-string="ni"><strong>二の糸</strong><small id="hzNi"></small></button>
        <button data-string="san"><strong>三の糸</strong><small id="hzSan"></small></button>
      </div>
      <button id="stopButton" class="stop-button" type="button">音と測定を止める</button>
    </section>

    <section class="card tuner-card">
      <p id="micState" class="mic-state">合わせ方を選んでください</p>
      <div class="meter" aria-label="音程メーター">
        <span>低い</span><span>合っている</span><span>高い</span>
        <div class="meter-track"><div id="meterNeedle" class="meter-needle"></div></div>
      </div>
      <p id="judgement" class="judgement">三味線を弾くと判定します</p>
      <div class="shami-feedback">
        <img id="expressionImage" src="./images/expressions/shami_listening.png" alt="シャミ">
        <p id="shamiMessage">音を聴く準備をしています</p>
      </div>
    </section>

    <div id="sceneOverlay" class="scene-overlay" hidden>
      <img id="sceneImage" alt="">
    </div>

    <p class="note">
      初回はマイク使用の確認が表示されます。「許可」を選んでください。
      基準音が鳴っている間は、その音を判定しないよう測定を短時間休止します。
    </p>
    <p class="version">調弦 Ver.2.4.3</p>
  </main>
  <script src="./tuner.js?v=240" defer></script>
  <script src="./tuning-app.js?v=240" defer></script>
</body>
</html>
